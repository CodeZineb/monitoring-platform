groups:
- name: alert.rules
  rules:

  - alert: InstanceDown
    expr: up == 0
    for: 1m
    annotations:
      title: "Instance {{ $labels.instance }} down"
      description: "{{ $labels.instance }} of job {{ $labels.job }} is down"
    labels:
      severity: critical

  - alert: HostOutOfMemory
    expr: (node_memory_MemAvailable / node_memory_MemTotal) * 100 < 25
    for: 5m
    annotations:
      title: "Low memory on {{ $labels.instance }}"
      description: "Memory usage is critical on {{ $labels.instance }}"

  - alert: HighCPUUsage
    expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
    for: 2m
    annotations:
      title: "High CPU usage on {{ $labels.instance }}"
      description: "CPU usage is above 80%"
    labels:
      severity: warning

  # =========================
  # HIGH MEMORY
  # =========================
  - alert: HighMemoryUsage
    expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
    for: 2m
    annotations:
      title: "High memory usage on {{ $labels.instance }}"
      description: "RAM usage is above 85%"
    labels:
      severity: warning

  # =========================
  # DISK USAGE
  # =========================
  - alert: HighDiskUsage
    expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes) * 100 < 20
    for: 1s 
    annotations:
      title: "Low disk space on {{ $labels.instance }}"
      description: "Disk free space is below 20%" 
   
    labels:
      severity: warning
